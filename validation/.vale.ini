# Vale Configuration for AKR Documentation Standards
# https://vale.sh/docs/topics/config/

# Core settings
StylesPath = validation/vale-rules

# Minimum alert level (suggestion, warning, error)
MinAlertLevel = suggestion

# Vocabulary (project-specific terminology)
Vocab = AKR

# File patterns to check
[*.md]
# Apply all AKR rules to markdown files
BasedOnStyles = AKR

# Ignore certain patterns
TokenIgnores = (\$\$.*\$\$), (`.*`)

# Ignore code blocks
BlockIgnores = (?s) *```.*?```

[*.{cs,ts,tsx,js,jsx,py,java}]
# Don't check source code files directly
BasedOnStyles = 

# Ignore certain sections in markdown
[*.md]
# Ignore YAML front matter
BlockIgnores = (?s)^---$.+?^---$, (?s) *```.*?```

# Comment patterns to ignore
TokenIgnores = (\$\$.*\$\$), (`[^`]+`), (🤖|❓|👤), (<!--.*?-->)
